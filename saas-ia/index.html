<!DOCTYPE html>
<html lang="en">
<head>

    <title>Mi Startup de IA</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f1f5f9;
        text-align: center;
    }

    h1 {
        font-size: 3rem;
        margin-top: 40px;
        color: #38bdf8;
    }

    h2 {
        color: #e2e8f0;
        margin-top: 30px;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 20px auto;
        max-width: 500px;
    }

    ul li {
        background: rgba(255,255,255,0.1);
        margin: 10px 0;
        padding: 12px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
    }

    img {
        margin: 15px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    a {
        display: inline-block;
        margin-top: 20px;
        color: #38bdf8;
        text-decoration: none;
        font-weight: bold;
    }

    a:hover {
        color: #0ea5e9;
    }

    form {
        margin-top: 30px;
    }

    input {
        padding: 12px;
        width: 300px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #0ea5e9;
    }
</style>
</head>
<body>
    <div style="padding: 20px;">
